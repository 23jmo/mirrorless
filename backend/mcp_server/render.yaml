services:
  - type: web
    name: mirrorless-mcp
    runtime: python
    rootDir: backend
    buildCommand: pip install -r mcp_server/requirements.txt
    startCommand: uvicorn mcp_server.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SERPER_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
